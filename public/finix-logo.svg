<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120">
  <rect width="120" height="120" rx="0" fill="#000000"/>
  <!-- Blue F logo - angular/modern style -->
  <g transform="translate(25, 18)">
    <!-- Main vertical bar -->
    <rect x="0" y="0" width="28" height="84" fill="#1A9BFF"/>
    <!-- Top horizontal bar (extends right with diagonal cut) -->
    <polygon points="28,0 70,0 70,26 28,26" fill="#1A9BFF"/>
    <polygon points="70,0 70,26 58,26" fill="#1A9BFF"/>
    <!-- Bottom horizontal bar -->
    <polygon points="28,38 60,38 60,54 28,54" fill="#1A9BFF"/>
  </g>
</svg>
